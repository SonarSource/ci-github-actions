---
name: Test update-release-channel
on:
  pull_request:
  merge_group:
  push:
    branches:
      - master
      - branch-*
  workflow_dispatch:

jobs:
  test-urc-happy-path:
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Update release channel (dry-run, happy path)
        id: urc
        uses: ./update-release-channel
        with:
          version: 0.0.0-test
          channel: stable
          product: test-fixture
          dryRun: true
      - name: Assert key output
        run: |
          [[ "${{ steps.urc.outputs.key }}" == "Distribution/test-fixture/stable.json" ]]
          [[ "${{ steps.urc.outputs.version-key }}" == "Distribution/test-fixture/stable.version" ]]
          [[ "${{ steps.urc.outputs.version-url }}" == "https://binaries.sonarsource.com/Distribution/test-fixture/stable.version" ]]
          [[ "${{ steps.urc.outputs.version }}" == "0.0.0-test" ]]
      - uses: ./config-npm
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
      - name: Validate body against schema/v1.json
        env:
          BODY: ${{ steps.urc.outputs.body }}
        run: |
          printf '%s' "$BODY" > /tmp/body.json
          check-jsonschema --schemafile update-release-channel/schema/v1.json /tmp/body.json

  test-urc-invalid-product:
    runs-on: sonar-xs
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Update release channel (invalid product)
        id: urc
        continue-on-error: true
        uses: ./update-release-channel
        with:
          version: 0.0.0-test
          channel: stable
          product: ../escape
          dryRun: true
      - name: Assert action failed
        run: |
          [[ "${{ steps.urc.outcome }}" == "failure" ]]

  test-urc-invalid-channel:
    runs-on: sonar-xs
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Update release channel (invalid channel)
        id: urc
        continue-on-error: true
        uses: ./update-release-channel
        with:
          version: 0.0.0-test
          channel: foo
          product: test-fixture
          dryRun: true
      - name: Assert action failed
        run: |
          [[ "${{ steps.urc.outcome }}" == "failure" ]]

  test-urc-custom-prefix:
    runs-on: sonar-xs
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Update release channel (custom prefix, warns but succeeds)
        id: urc
        uses: ./update-release-channel
        with:
          version: 0.0.0-test
          channel: stable
          product: test-fixture
          prefix: NotDistribution
          dryRun: true
      - name: Assert custom prefix used in key
        run: |
          [[ "${{ steps.urc.outputs.key }}" == "NotDistribution/test-fixture/stable.json" ]]
          [[ "${{ steps.urc.outputs.version-key }}" == "NotDistribution/test-fixture/stable.version" ]]
