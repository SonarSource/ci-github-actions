---
name: Required SCA Check
on:
  pull_request:
  merge_group:

permissions:
  id-token: write
  contents: read

jobs:
  verify-sca:
    runs-on: warp-custom-ubuntu-24-04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          sparse-checkout: check-sca
      - uses: ./check-sca
