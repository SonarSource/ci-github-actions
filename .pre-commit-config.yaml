# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer
  - repo: https://github.com/adrienverge/yamllint/
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, --config-file=.yamllint.yaml]
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d  # v0.11.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 1a4bb160cab6417b3045e1b37b6b72449243e658  # frozen: 0.37.4
    hooks:
      - id: check-github-workflows
        # TEMP: bundled schema predates `environment.deployment` (GA 2026-03)
        exclude: ^\.github/workflows/check-sca\.yml$
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338  # frozen: v0.49.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: be94b15d8c130a600a448c27d01220754b67a023  # frozen: 43.252.5
    hooks:
      - id: renovate-config-validator
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        # TEMP: actionlint v1.7.1 schema predates `environment.deployment`
        args:
          - -ignore
          - unexpected key "deployment" for "environment" section
