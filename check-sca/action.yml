---
name: Check SCA
description: >-
  Verify that SonarQube SCA (Software Composition Analysis) ran for the project.
  Discovers project keys from config files, polls all three SonarQube instances,
  and fails if SCA data is missing after timeout.

inputs:
  project-key:
    description: >-
      Explicit SonarQube project key to include when checking SCA results.
      The action also discovers additional project keys from
      .sonarlint/connectedMode.json, sonar-project.properties, pom.xml,
      build.gradle(.kts), and GITHUB_REPOSITORY. The explicit key is checked first.
    default: ''
  poll-timeout:
    description: Maximum time in seconds to poll for SCA results before failing.
    default: '300'
  poll-interval:
    description: Time in seconds between polling attempts.
    default: '15'
  working-directory:
    description: Relative path under github.workspace to look for project config files.
    default: .

outputs:
  sca-verified:
    description: Whether SCA was verified on at least one platform (true or false)
    value: ${{ steps.check.outputs.sca-verified || steps.vault-fail.outputs.sca-verified || 'false' }}
  platform:
    description: The SonarQube platform where SCA was found (next, sqc-us, or sqc-eu)
    value: ${{ steps.check.outputs.platform }}
  project-key:
    description: The project key where SCA was verified
    value: ${{ steps.check.outputs.project-key }}

runs:
  using: composite
  steps:
    - name: Set local action paths
      shell: bash
      run: |
        ACTION_PATH_CHECK_SCA="${{ github.action_path }}"
        echo "ACTION_PATH_CHECK_SCA=$ACTION_PATH_CHECK_SCA" >> "$GITHUB_ENV"

    - name: Build Manage Vault Policy link
      id: vault-link
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Port self-service deep link with this repo prefilled. actionInputs uses
        # Port's JSURL encoding; ignore_secrets=true pre-selects the auth-only fix
        # (adds auth.github, no kv_paths); current_week mirrors the action's
        # default_jq_query (now | strftime("%Y_%V")).
        NAME="${GITHUB_REPOSITORY##*/}"
        WEEK="$(date -u +%Y_%V)"
        # jsurl-escape '_' -> '*_'; prefix '*' to force string for digit-led values
        NAME_J="${NAME//_/*_}"; case "$NAME" in [0-9]*) NAME_J="*${NAME_J}" ;; esac
        WEEK_J="*${WEEK//_/*_}"
        INPUTS="(*StargetEntity~${NAME_J}~ignore*_secrets~_T~current*_week~${WEEK_J}~ref~master~use*_sandbox~_F)~"
        INPUTS="${INPUTS//(/%28}"; INPUTS="${INPUTS//)/%29}"; INPUTS="${INPUTS//\~/%7E}"
        echo "url=https://app.getport.io/org_FnpuoXpSHY1JC3yg/self-serve?action=manage_vault_policy&actionInputs=${INPUTS}" >> "$GITHUB_OUTPUT"
      # yamllint enable rule:line-length

    - uses: SonarSource/vault-action-wrapper@0a3114fe1230b784c35b53b099f9ab1f1e538cc7 # 3.5.0
      id: secrets
      continue-on-error: true
      with:
        secrets: |
          development/kv/data/next url | NEXT_URL;
          development/kv/data/next token | NEXT_TOKEN;
          development/kv/data/sonarqube-us url | SQC_US_URL;
          development/kv/data/sonarqube-us token | SQC_US_TOKEN;
          development/kv/data/sonarcloud url | SQC_EU_URL;
          development/kv/data/sonarcloud token | SQC_EU_TOKEN;

    - name: Fail on missing Vault access
      if: steps.secrets.outcome == 'failure'
      id: vault-fail
      shell: bash
      env:
        PORT: ${{ steps.vault-link.outputs.url }}
        FAQ: https://xtranet-sonarsource.atlassian.net/wiki/spaces/Platform/pages/5136908364/SCA+Scanning+Checks#FAQ
      # yamllint disable rule:line-length
      run: |
        echo "sca-verified=false" >> "$GITHUB_OUTPUT"
        NAME="${GITHUB_REPOSITORY##*/}"
        {
          echo "## SCA check failed — Vault access missing"
          echo ""
          echo "\`${NAME}\` isn't allowed to read the SonarQube secrets from Vault, so the SCA scan never ran."
          echo ""
          echo "**Fix:** run the **[Manage Vault Policy SPEED action](${PORT})** to grant \`${NAME}\` access, then re-run this check."
          echo ""
          echo "ℹ️ [SCA Scanning Checks FAQ](${FAQ})"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "::error title=SCA check failed — Vault access missing for ${NAME}::Run the Manage Vault Policy SPEED action to grant ${NAME} access to the SonarQube secrets, then re-run. Link in the job summary."
        exit 1
      # yamllint enable rule:line-length

    - name: Verify SCA ran
      if: steps.secrets.outcome == 'success'
      id: check
      shell: bash
      env:
        PROJECT_KEY_INPUT: ${{ inputs.project-key }}
        POLL_TIMEOUT: ${{ inputs.poll-timeout }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        PULL_REQUEST: ${{ github.event.pull_request.number || '' }}
        NEXT_URL: ${{ fromJSON(steps.secrets.outputs.vault).NEXT_URL }}
        NEXT_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).NEXT_TOKEN }}
        SQC_US_URL: ${{ fromJSON(steps.secrets.outputs.vault).SQC_US_URL }}
        SQC_US_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SQC_US_TOKEN }}
        SQC_EU_URL: ${{ fromJSON(steps.secrets.outputs.vault).SQC_EU_URL }}
        SQC_EU_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SQC_EU_TOKEN }}
      run: ${ACTION_PATH_CHECK_SCA}/check-sca.sh

    - name: Generate workflow summary
      if: always() && steps.vault-fail.outcome != 'failure'
      shell: bash
      env:
        SCA_VERIFIED: ${{ steps.check.outputs.sca-verified }}
        SCA_PLATFORM: ${{ steps.check.outputs.platform }}
        SCA_PROJECT_KEY: ${{ steps.check.outputs.project-key }}
        PORT: ${{ steps.vault-link.outputs.url }}
        FAQ: https://xtranet-sonarsource.atlassian.net/wiki/spaces/Platform/pages/5136908364/SCA+Scanning+Checks#FAQ
      # yamllint disable rule:line-length
      run: |
        NAME="${GITHUB_REPOSITORY##*/}"
        {
          echo "## SCA Verification"
          echo ""
          if [[ "$SCA_VERIFIED" == "true" ]]; then
            echo "SCA verified on **${SCA_PLATFORM}** for project \`${SCA_PROJECT_KEY}\`."
          else
            echo "SCA check failed — no SCA data could be read for \`${NAME}\`."
            echo ""
            echo "Most often the repo isn't allowed to read the SonarQube secrets from Vault. **Fix:** run the **[Manage Vault Policy SPEED action](${PORT})** to grant \`${NAME}\` access, then re-run."
            echo ""
            echo "If access is already set up, the project may not be analyzed yet or \`check-sca.project-key\` may not match — see the **Verify SCA ran** logs above."
          fi
          echo ""
          echo "ℹ️ [SCA Scanning Checks FAQ](${FAQ})"
        } >> "$GITHUB_STEP_SUMMARY"
      # yamllint enable rule:line-length
